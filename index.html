<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join with us</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>
   
    <div class="main-container">

    <!-- LEFT IMAGE -->
    <div class="image-container">
        <img src="https://deliverback.com/blog/wp-content/uploads/2024/11/Screenshot-2024-11-01-at-13.51.30-1024x588.png" alt="Lost and Found" class="img">
    </div>

    <!-- RIGHT LOGIN -->
    <div class="container">
        
    </div>

</div>
        <div class="form-container">
            <h1>Join with us...</h1>
            <p class="subtitle">Your account helps you tracks your lost and found items</p> 
            
                       
            <form id="authForm">
                <div class="input-group">
                    <label for="email">E-mail / Username</label>
                    <input type="text" id="email" name="email" placeholder="Insert your e-mail or username" required>
                </div>
                
           <div class="input-group">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Insert your password" required>
    <div class="show-password" id="togglePassword">Show Password</div>
</div>



                
                <div class="forgot-password">
                    <a href="#" id="forgotPassword">Forgot Password ?</a>
                </div>
                
                <button type="submit" class="btn-signin" id="signinBtn">Sign In</button>
                
                <div class="divider">Or</div>
                
                <button type="button" class="btn-signup" id="signupBtn">Sign Up</button>
            </form>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
